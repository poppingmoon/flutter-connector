id: org.unifiedpush.Troubleshooter
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: up_troubleshoot
finish-args:
  # X11 fallback
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  # To send the test notification
  - --share=network
  # UnifiedPush
  - --talk-name=org.unifiedpush.Distributor.*
  # We don't need to explicitly own org.unifiedpush.Troubleshooter, as our id
  # is automatically allowed, if we were using a different service name:
  #- --own-name=org.unifiedpush.Troubleshooter
  #
  # Used to show notifications
  - --talk-name=org.freedesktop.Notifications
modules:
  - name: App
    buildsystem: simple
    build-commands:
      - unzip flutter-example-linux.zip -d ${FLATPAK_DEST}/bin/
    post-install:
      - install -Dm0644 LICENSE -t ${FLATPAK_DEST}/share/licenses/$FLATPAK_ID/App
      - install -Dm0644 org.unifiedpush.Troubleshooter.png -t ${FLATPAK_DEST}/share/icons/hicolor/512x512/apps
      - install -Dm0644 org.unifiedpush.Troubleshooter.service -t ${FLATPAK_DEST}/share/dbus-1/services
      - install -Dm0644 org.unifiedpush.Troubleshooter.desktop -t ${FLATPAK_DEST}/share/applications
      - install -Dm0644 org.unifiedpush.Troubleshooter.metainfo.xml -t ${FLATPAK_DEST}/share/metainfo
    sources:
      #- type: file
      #  path: ../flutter-example-linux.zip
      - type: file
        url: https://codeberg.org/api/packages/UnifiedPush/generic/flutter-connector/v6.2.0+1.0.0+1/flutter-example-linux.zip
        sha256: a6b74758342003b5479a630904669b9bfd8e947cbb409299d42b9e04b7bbbe40
      - type: file
        path: ./assets/LICENSE
        sha256: faaebd0bfade3856fabd34d5bf20bd0db37a849806bf45de3c213e6c2da2f51b
      - type: file
        path: ./assets/org.unifiedpush.Troubleshooter.png
        sha256: 4e50cd21735c0f9785ddbd3f22f8daca9e4f97eb61ad661e61aa76be2a04e02c
      - type: file
        path: ./assets/org.unifiedpush.Troubleshooter.service
        sha256: dbb24a5b937fba4cc39d64126ce5f8d748f1af10e30ed003e4c254b94c45b533
      - type: file
        path: ./assets/org.unifiedpush.Troubleshooter.desktop
        sha256: 4f359d34fb43fa2ca794d798e04aeb6d14e0013714913d463cebce30a00430a6
      - type: file
        path: ./assets/org.unifiedpush.Troubleshooter.metainfo.xml
